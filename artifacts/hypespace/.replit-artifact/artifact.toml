kind = "web"
previewPath = "/"
title = "HypeSpace - Event Management"
version = "1.0.0"
id = "artifacts/hypespace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19498

[services.development]
run = "pnpm --filter @workspace/hypespace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hypespace", "run", "build" ]
publicDir = "artifacts/hypespace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19498"
BASE_PATH = "/"
