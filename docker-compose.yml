services:
  postgres:
    image: postgres:16-alpine
    container_name: hypespace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hypespace
      POSTGRES_PASSWORD: hypespace
      POSTGRES_DB: hypespace
    ports:
      - "5432:5432"
    volumes:
      - hypespace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypespace -d hypespace"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  hypespace_pgdata:
